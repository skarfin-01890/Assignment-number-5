<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Github issue tracker</title>
	<link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
	<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
	<link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
		integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
		crossorigin="anonymous" referrerpolicy="no-referrer" />
	<style>
		* {
			font-family: "Geist", sans-serif;

		}
	</style>
</head>

<body>
	<header>
		<div class="navbar bg-base-100 shadow-sm ">
			<div class="flex-1">
				<diV class="flex sm:gap-1 ml-0 lg:ml-20 gap-1">
					<img class="w-11" src="./assets/github-logo.png" alt="github logo">
					<h1 class="flex items-center font-semibold text-xl ">GitHub Issues Tracker</h1>
				</diV>

			</div>
			<div class="flex gap-2 mr-20">
				<input type="text" placeholder="🔍 Search issues..." class="input input-bordered w-24 md:w-auto" />



				<button class="btn btn-primary">+New Issue</button>
			</div>
		</div>

		</div>
		</div>
		</div>
	</header>
	<section class=" w-9/12 mx-auto mt-4">
		<div id="button-div" class="bg-base-100 shadow-sm p-6 gap-2">
			<button onclick="filterIssues('all')" id="all-btn" class="btn btn-primary  px-11">All</button>
			<button onclick="filterIssues('open')" id="all-btn" class="btn btn-primary px-8">Open</button>
			<button onclick="filterIssues('closed')" id="all-btn" class="btn btn-primary px-6">Closed</button>
		</div>
	</section>
	<section class=" w-9/12 mx-auto flex justify-between bg-base-100 shadow-sm p-6 mt-4">
		<div class=" flex gap-2 ">
			<div class="">
				<img class="w-12 h-12 p-2 bg-gray-300 rounded-full" src="./assets/Aperture.png">
			</div>
			<div>
				<P class="font-bold"><span id="issue-count">50</span> Issues</P>

				<p class="text-gray-500 ">Track and manage your project issues</p>
			</div>

		</div>
		<diV class="flex gap-4">
			<div><span class="w-3 inline-block h-3 bg-green-600 rounded-full"> </span>
				<span class="">Open

				</span>
			</div>
			<div><span class="w-3 inline-block h-3 bg-purple-600 rounded-full"> </span>
				<span class="">Closed

				</span>
			</div>
		</div>


	</section>
	<section id="card-container" class="w-9/12 mx-auto grid grid-cols-1 md:grid-cols-2  lg:grid-cols-4 mt-6  gap-3">





	</section>


	<!-- Open the modal using ID.showModal() method -->
	<button class="btn" onclick="my_modal_5.showModal()">open modal</button>
	<dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">

	</dialog>
	<script src="./home.js"></script>
</body>

</html>
