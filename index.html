<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Github issue tracker</title>
	<link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
	<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
	<link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
	<style>
		* {
			font-family: "Geist", sans-serif;
		}

		.divider {
			display: flex;
			align-items: center;
			text-align: center;
			margin: 24px 0;
			justify-content: center;
			color: #888
		}

		.divider::before,
		.divider::after {
			content: '';
			flex: 1;
			border-bottom: 1px solid #ddd;
		}

		.divider {
			margin-right: .50em;

			margin-left: .50em;
		}

		.divider span {
			font-size: 14px;
			font-weight: bold;

		}
	</style>
</head>

<body class="min-h-screen w-full max-w-lg bg-[#FFFFFF] mx-auto rounded-1xl mt-[78px] shadow-2xl">
	<div class="items-center flex flex-col justify-center text-center">
		<img class="mt-[32px]" src="./assets/github-logo.png" alt="github image">
		<h1 class="font-medium text-2xl mt-6">GitHub Issues Tracker</h1>
		<p class="text-gray-600 mt-1">Sign in to manage your issues</p>

	</div>
	<div class="w-11/12 mx-auto mt-6">
		<label class="font-medium">User name</label>
		<br>
		<input class="w-full py-2 px-3 bg-gray-50 border mt-2 border-gray-200 rounded-lg " type="text"
			placeholder="Enter Username">
		<P class="text-blue-600 mt-1 mb-4">Default: admin</P>
		<label class="font-medium ">Password</label>
		<br>
		<input class="w-full py-2 px-3 bg-gray-50 border mt-2 border-gray-200 rounded-lg " type="password"
			placeholder="Enter Password">
		<P class="text-blue-600 mt-1">Default: admin123</P>
		<button class="btn btn-primary w-full py-4 px-4 rounded-lg mt-6">Sign in</button>
	</div>
	<div class="divider">
		<spaN>OR</spaN>
	</div>
	<p class="text-center mt-6 text-gray-600 ">Demo Credentials:</p>
</body>
<div class="bg-gray-200 w-11/12 mx-auto rounded-lg m-1 py-6 ">
	<P class="text-center"><span class="font-semibold">Username</span>:admin</P>
	<P class="text-center"><span class="font-semibold">Password</span>:admin123</P>
</div>

</div>

</html>
